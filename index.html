    <meta property="og:title" content="MCCI 국제멘탈코칭센터" />
    <meta
      property="og:description"
      content="국제멘탈코칭센터(MCCI) 멘탈코칭전문가양성과정 통합 관리 플랫폼"
    />

    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:type" content="image/png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://hercules.app/og/app/%VITE_HERCULES_WEBSITE_ID%.png"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
      crossorigin
    />
    <!-- Pretendard: Korean-optimized variable font -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />

    <!-- PWA Configuration -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MCCI-SMPCC" />
    <link rel="apple-touch-icon" href="/icon/icon-192.png" />

    <!-- Detect dark mode preference and set the class before next-themes loads. This avoids a flash of unstyled content (FOUC) when the page loads. -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("theme");
          if (theme === "system" || !theme) {
            var prefersDark = window.matchMedia(
              "(prefers-color-scheme: dark)",
            ).matches;
            theme = prefersDark ? "dark" : "light";
          }
          document.documentElement.classList.add(theme);
        } catch (e) {}
      })();
    </script>

    <link href="/src/index.css" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Portal for print-only content (coaching log PDF, etc.) -->
    <div id="print-portal"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
